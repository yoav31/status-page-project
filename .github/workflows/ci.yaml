name: CI Pipeline (Build & Push)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: yoav_project_ecr

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Calculate Next Version Tag
        id: calc-tag
        run: |
          LATEST_TAG=$(aws ecr describe-images --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' --output text 2>/dev/null || echo "v0")
          
          if [[ "$LATEST_TAG" =~ ^v[0-9]+$ ]]; then
              CURRENT_VERSION=${LATEST_TAG#v}
          else
              CURRENT_VERSION=0
          fi
          
          NEW_VERSION=$((CURRENT_VERSION + 1))
          echo "IMAGE_TAG=v$NEW_VERSION" >> $GITHUB_ENV
          echo "Next version tag will be: v$NEW_VERSION"

      - name: Build, Tag, and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "Building image..."
          docker build -f status-page/Dockerfile -t $FULL_IMAGE ./status-page/
          
          echo "Pushing to ECR..."
          docker push $FULL_IMAGE

      - name: Update Kubernetes Manifest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "Updating deployment.yaml with new image..."
          
          sed -i "s|image: .*${{ env.ECR_REPOSITORY }}.*|image: $FULL_IMAGE|g" EKS-deployments-files/app-deployment.yaml

      - name: Commit and Push Changes to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add EKS-deployments-files/app-deployment.yaml
    
          git commit -m "chore: update image tag to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git push