apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: status-page
  template:
    metadata:
      labels:
        app: status-page
    spec:
      containers:
      - name: status-page-container
        image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yoav_project_ecr:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: master.yoav-redis-subnet-group.7fftml.use1.cache.amazonaws.com

        - name: REDIS_PORT
          value: "6379"

        - name: DB_HOST
          value: yoav-project-db.cx248m4we6k7.us-east-1.rds.amazonaws.com

        - name: DB_NAME
          value: postgres

        - name: DB_USER
          value: postgres



        - name: ALLOWED_HOSTS
          value: "*"

        - name: GUNICORN_CMD_ARGS
          value: "--bind 0.0.0.0:8000 --timeout 300"

        - name: DEBUG
          value: "True"

        - name: REDIS_SSL
          value: "True"

        - name: AWS_STORAGE_BUCKET_NAME
          value: "yoav-project-s3"

        - name: AWS_S3_REGION_NAME
          value: "us-east-1"
          
        - name: USE_S3
          value: "True"  